Base:
  model_root: ./checkpoints/
  num_workers: 3
  verbose: 1
  early_stop_patience: 2
  pickle_feature_encoder: true
  save_best_only: true
  eval_steps: null
  debug_mode: false
  group_id: null
  use_features: null
  feature_specs: null
  feature_config: null
HiFormer_movielenslatest_x1_unified:
  loss: binary_crossentropy
  task: binary_classification
  optimizer: adamw
  learning_rate: 0.001
  embedding_regularizer: 0.005
  net_regularizer: 5.0e-05
  epochs: 100
  shuffle: true
  seed: 2024
  monitor_mode: max
  early_stop_patience: 2
  dataset_id: movielenslatest_x1
  batch_size: 2048
  metrics:
  - AUC
  - logloss
  monitor: AUC
  model: HiFormer
  embedding_dim: 128
  num_transformer_layers: 2
  transformer_dropout: 0.0
  use_pos_embedding: false
  net_dropout: 0.2
  batch_norm: false
  data_block_size: 1000000
  num_heads: 4
  low_rank_dim: 8
  ffn_in_dim: null
  ffn_out_dim: 128
  use_cosine_lr: false
