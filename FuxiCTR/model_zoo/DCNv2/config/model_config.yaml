    feature_config: null

DCNv2_movielens_test:
    model: DCNv2
    dataset_id: movielenslatest_x1
    loss: 'binary_crossentropy'
    metrics: ['AUC', 'logloss']
    task: binary_classification
    optimizer: adam
    model_structure: parallel
    use_low_rank_mixture: False
    low_rank: 32
    num_experts: 4
    learning_rate: 1.0e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 4096
    embedding_dim: 64
    stacked_dnn_hidden_units: [256, 128]
    parallel_dnn_hidden_units: [256, 128]
    dnn_activations: relu
    num_cross_layers: 3
    net_dropout: 0.2
    batch_norm: True
    epochs: 10
    shuffle: True
    seed: 2024
    monitor: 'AUC'
    monitor_mode: 'max'

