  early_stop_patience: 2
  group_id: group_id
  feature_specs:
    - feature_encoder: nn.Linear(64, 64, bias=False)
      name: item_emb
    - feature_encoder: layers.MaskedAveragePooling()
      name: pos_items
    - feature_encoder: layers.MaskedAveragePooling()
      name: neg_items
    - feature_encoder:
        - layers.MaskedAveragePooling()
        - nn.Linear(64, 64, bias=False)
      name: pos_items_emb
    - feature_encoder:
        - layers.MaskedAveragePooling()
        - nn.Linear(64, 64, bias=False)
      name: neg_items_emb
