Base:
    model_root: './checkpoints/'
    num_workers: 3
    verbose: 1
    early_stop_patience: 2
    pickle_feature_encoder: True
    save_best_only: True
    eval_steps: null
    debug_mode: False
    group_id: null
    use_features: null
    feature_specs: null
    feature_config: null

TransformerCTR_test:
    model: TransformerCTR
    dataset_id: tiny_parquet
    loss: 'binary_crossentropy'
    metrics: ['logloss', 'AUC']
    task: binary_classification
    optimizer: adam
    learning_rate: 1.e-3
    embedding_regularizer: 1.e-8
    net_regularizer: 0
    batch_size: 128
    embedding_dim: 32
    num_transformer_layers: 2
    num_heads: 2
    transformer_dropout: 0.1
    ffn_dim: 64
    use_cls_token: True
    use_pos_embedding: True
    output_mlp_hidden_units: [64, 32]
    net_dropout: 0.0
    batch_norm: False
    epochs: 1
    shuffle: True
    seed: 2019
    monitor: 'AUC'
    monitor_mode: 'max'

TransformerCTR_default:
    model: TransformerCTR
    dataset_id: TBD
    loss: 'binary_crossentropy'
    metrics: ['logloss', 'AUC']
    task: binary_classification
    optimizer: adam
    learning_rate: 1.e-3
    embedding_regularizer: 0
    net_regularizer: 0
    batch_size: 4096
    embedding_dim: 64
    num_transformer_layers: 3
    num_heads: 4
    transformer_dropout: 0.1
    ffn_dim: 256
    use_cls_token: True
    use_pos_embedding: True
    output_mlp_hidden_units: [128, 64]
    net_dropout: 0.0
    batch_norm: False
    epochs: 100
    shuffle: True
    seed: 2019
    monitor: {'AUC': 1, 'logloss': -1}
    monitor_mode: 'max'
