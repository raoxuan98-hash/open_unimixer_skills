    dtype: int
    name: group_id
    preprocess: copy_from(userid)
    remap: false
    type: meta
  - active: true
    dtype: str
    name:
    - userid
    - cms_segid
    - cms_group_id
    - final_gender_code
    - age_level
    - pvalue_level
    - shopping_level
    - occupation
    - new_user_class_level
    - adgroup_id
    - cate_id
    - campaign_id
    - customer
    - brand
    - pid
