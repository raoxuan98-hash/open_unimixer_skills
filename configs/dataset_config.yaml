kuaivideo_x1:
  data_format: csv
  data_root: ./download_datasets/data/Kuaivideo_x1
  feature_cols:
  - active: true
    dtype: int
    name: group_id
    preprocess: copy_from(user_id)
    remap: false
    type: meta
  - active: true  
    dtype: str
    name: user_id
    type: categorical
  - active: true
    dtype: str
    name: item_id
    type: categorical
  - active: true
    dtype: str
    embedding_dim: 64
    min_categr_count: 1
    name: item_emb
    preprocess: copy_from(item_id)
    pretrained_emb: ./download_datasets/Kuaivideo_x1/item_visual_emb_dim64.h5
    type: categorical
  - active: true
    dtype: str
    max_len: 100
    name: pos_items
    padding: pre
    share_embedding: item_id
    splitter: ^
    type: sequence
  - active: true
    dtype: str
    max_len: 100
    name: neg_items
    padding: pre
    share_embedding: item_id
    splitter: ^
    type: sequence
  - active: true
    dtype: str
    embedding_dim: 64
    max_len: 100
    min_categr_count: 1
    name: pos_items_emb
    padding: pre
    preprocess: copy_from(pos_items)
    pretrained_emb: ./download_datasets/Kuaivideo_x1/item_visual_emb_dim64.h5
    share_embedding: item_emb
    splitter: ^
    type: sequence
  - active: true
    dtype: str
    embedding_dim: 64
    max_len: 100
    min_categr_count: 1
    name: neg_items_emb
    padding: pre
    preprocess: copy_from(neg_items)
    pretrained_emb: ./download_datasets/Kuaivideo_x1/item_visual_emb_dim64.h5
    share_embedding: item_emb
    splitter: ^
    type: sequence
  label_col:
    dtype: float
    name: is_click
  min_categr_count: 10
  test_data: ./download_datasets/Kuaivideo_x1/test.csv
  train_data: ./download_datasets/Kuaivideo_x1/train.csv
  valid_data: ./download_datasets/Kuaivideo_x1/valid.csv
  feature_specs:
  - feature_encoder: nn.Linear(64, 64, bias=False)
    name: item_emb
  - feature_encoder: layers.MaskedAveragePooling()
    name: pos_items
  - feature_encoder: layers.MaskedAveragePooling()
    name: neg_items
  - feature_encoder:
    - layers.MaskedAveragePooling()
    - nn.Linear(64, 64, bias=False)
    name: pos_items_emb
  - feature_encoder:
    - layers.MaskedAveragePooling()
    - nn.Linear(64, 64, bias=False)
    name: neg_items_emb
taobaoad_x1:
  data_format: csv
  data_root: ./download_datasets/TaobaoAd_x1
  feature_cols:
